name: Build and Release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmw-agent-linux-amd64
          - goos: linux
            goarch: arm64
            output: mmw-agent-linux-arm64
          - goos: darwin
            goarch: amd64
            output: mmw-agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: mmw-agent-darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Go mod download
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o build/${{ matrix.output }} ./cmd/mmw-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Add executable permissions
        run: |
          chmod +x release/mmw-agent-linux-amd64
          chmod +x release/mmw-agent-linux-arm64
          chmod +x release/mmw-agent-darwin-amd64
          chmod +x release/mmw-agent-darwin-arm64

      - name: Create checksums
        run: |
          cd release
          sha256sum mmw-agent-linux-amd64 > checksums.txt
          sha256sum mmw-agent-linux-arm64 >> checksums.txt
          sha256sum mmw-agent-darwin-amd64 >> checksums.txt
          sha256sum mmw-agent-darwin-arm64 >> checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/mmw-agent-linux-amd64
            release/mmw-agent-linux-arm64
            release/mmw-agent-darwin-amd64
            release/mmw-agent-darwin-arm64
            release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
